name: Build and Push Docker Image
"on":
  workflow_dispatch:
    inputs:
      version:
        description: "The release version"
        required: true
  release:
    types: [published]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set version from release
        if: github.event_name == 'release'
        run: echo "RELEASE_VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        run: echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -v ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set commit sha
        run: echo "COMMIT_SHA=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"

      - name: Get build time
        run: echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            APP_VERSION=${{ env.RELEASE_VERSION }}
            APP_GIT_COMMIT=${{ env.COMMIT_SHA }}
            APP_BUILD_TIME=${{ env.BUILD_TIME }}
            APP_GIT_REPOSITORY=${{ github.repository }}
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.RELEASE_VERSION }}
            ghcr.io/${{ github.repository }}:${{ env.COMMIT_SHA }}
            ghcr.io/${{ github.repository }}:latest
